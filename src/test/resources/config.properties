# ==========================================================
# Environment configuration
# Override any of these at runtime with -Dkey=value, e.g.:
#   mvn test -Dbrowser=firefox -Denv.url=https://automationexercise.com
# ==========================================================

# Base URL of the application under test
base.url=https://automationexercise.com

# Browser to run tests on: chrome | firefox | edge
browser=chrome

# Run browser without a visible UI (true/false)
headless=false

# Explicit wait timeout (seconds) used by WebDriverWait across the framework
explicit.wait=15

# Page load timeout (seconds)
pageload.timeout=30

# Implicit wait (seconds) - kept minimal; framework relies mainly on explicit waits
implicit.wait=2

# Directory where failure screenshots are stored
screenshot.dir=test-output/screenshots

# Directory where the ExtentReports HTML report is generated
report.dir=test-output/ExtentReport

# A registered test account on automationexercise.com used for login test scenarios.
# NOTE: automationexercise.com is a public demo site with no real checkout/payment
# processing - all card/payment data below is dummy demo data only.
valid.user.email=selenium.qa.demo01@mailinator.com
valid.user.password=SeleniumQA@123
invalid.user.password=WrongPass@999
